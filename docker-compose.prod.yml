services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3005:3001"
    env_file:
      - ./server/.env

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3004:5173"
    environment:
      VITE_API_TARGET: http://backend:3001
      VITE_API_KEY: ${VITE_API_KEY}
    depends_on:
      - backend
